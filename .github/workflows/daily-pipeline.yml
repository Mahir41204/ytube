name: 🎬 Daily Immersive Scenario Videos

on:
  schedule:
    - cron: '30 3 * * *'   # 9:00 AM IST daily
  workflow_dispatch:
    inputs:
      topic:
        description: 'Specific topic, e.g. "Your Life as a Viking" (blank = auto-discover)'
        required: false
        default: ''
      n_videos:
        description: 'Number of videos if auto-discovering'
        required: false
        default: '2'

jobs:
  produce-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu-core
          ffmpeg -version | head -1

      - name: Install Python packages
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          GEMINI_API_KEY:          ${{ secrets.GEMINI_API_KEY }}
          HF_TOKEN:                ${{ secrets.HF_TOKEN }}
          PEXELS_API_KEY:          ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_CLIENT_ID:       ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET:   ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN:   ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          AIRTABLE_API_TOKEN:      ${{ secrets.AIRTABLE_API_TOKEN }}
          AIRTABLE_BASE_ID:        ${{ secrets.AIRTABLE_BASE_ID }}
        run: |
          if [ -n "${{ github.event.inputs.topic }}" ]; then
            echo "▶ Producing: ${{ github.event.inputs.topic }}"
            python pipeline.py --topic "${{ github.event.inputs.topic }}"
          else
            N=${{ github.event.inputs.n_videos || '2' }}
            echo "▶ Auto-discovering and producing $N videos..."
            python pipeline.py --n "$N"
          fi

      - name: Upload videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: videos-${{ github.run_number }}
          path: outputs/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-log-${{ github.run_number }}
          path: pipeline.log
          retention-days: 14
